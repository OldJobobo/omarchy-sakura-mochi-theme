# hyprland.conf
# By OldJobobo (https://github.com/OldJobobo)
# 
#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.i
$activeBorderColor = rgba(f23888ee)
$inactiveBorderColor = rgba(5aa15d99)
$shadowColor = rgba(0b0d118c)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 2
    gaps_in = 12
    gaps_out = 24
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
  active_opacity = 0.97
  inactive_opacity = 0.95
    rounding = 14

    blur {
        enabled = true
        size = 6
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        xray = false
        noise = 0.03
        contrast = 0.87
        vibrancy = 0.03
        vibrancy_darkness = 0.7
        brightness = 0.42
        popups_ignorealpha = 0.5
        input_methods_ignorealpha = 0.5
    }

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = $shadowColor
        color_inactive = $shadowColor
        offset = 2 2
    }
}

animations {
    enabled = true

    bezier = mochiFloat, 0.22, 0.9, 0.2, 1.0
    bezier = sakuraDrift, 0.3, 1.05, 0.38, 1.0
    bezier = glassFade, 0.18, 0.0, 0.12, 1.0
    bezier = workspaceGlide, 0.23, 0.84, 0.34, 1.0

    animation = windows, 1, 5, mochiFloat
    animation = windowsIn, 1, 5, sakuraDrift, popin 10%
    animation = windowsOut, 1, 4, glassFade, popin 82%
    animation = windowsMove, 1, 5, mochiFloat

    animation = border, 1, 6, glassFade
    animation = fade, 1, 5, glassFade
    animation = layers, 1, 5, sakuraDrift, slidefade
    animation = layersIn, 1, 5, sakuraDrift, slidefade
    animation = layersOut, 1, 4, glassFade, fade
    animation = workspaces, 1, 10, workspaceGlide, slide
}

